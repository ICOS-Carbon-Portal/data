<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Multi-image ZIP preview</title>
    <link rel="stylesheet" href="https://static.icos-cp.eu/css/bootstrap/5.3.3/icos-bootstrap.css" />
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.7.2/css/all.css">
  </head>
  <body>
    <div id="container">
      <div class="d-flex mb-2 ms-auto align-items-center justify-content-between">
        <div class="btn-group">
          <button title="To previous image" type="button" id="previous-button"
              class="btn btn-outline-secondary" disabled>
            <i class="fas fa-chevron-left"></i>
          </button>
          <button title="To next image" type="button" id="next-button"
              class="btn btn-outline-secondary me-2" disabled>
            <i class="fas fa-chevron-right"></i>
          </button>
        </div>
        <select id="zipimageselect" class="form-select col" style="max-width: fit-content;"></select>
        <button title="Enhance contrast (2–98th percentile stretch with YlGnBu colormap)" type="button"
            id="enhance-button" class="btn btn-outline-secondary ms-2">
          <i class="fas fa-wand-magic-sparkles"></i> Enhance
        </button>
      </div>
      <canvas id="multiimagezipframe" class="mw-100"></canvas>
      <div id="colorbar-container" style="display: none;" class="mt-1 d-flex align-items-center gap-2">
        <span id="colorbar-min" class="text-muted small"></span>
        <canvas id="colorbar-canvas" width="200" height="16" style="border: 1px solid #ccc; flex-shrink: 0;"></canvas>
        <span id="colorbar-max" class="text-muted small"></span>
      </div>
    </div>
    <script type="text/javascript" src="./imagezipview.js"></script>
  </body>
</html>
